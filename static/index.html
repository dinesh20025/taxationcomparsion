<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Income Tax AI</title>  
<style>  
  * { margin:0; padding:0; box-sizing:border-box; }  
  body {  
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;  
    background:#1a1a1a; color:#e8e8e8; height:100vh;  
    display:flex; overflow:hidden;  
  }  
  
  /* ===== SIDEBAR ===== */  
  #sidebar {  
    width:260px; background:#171717; border-right:1px solid #2d2d2d;  
    display:flex; flex-direction:column; flex-shrink:0;  
    transition:margin-left 0.25s;  
  }  
  #sidebar.hidden { margin-left:-260px; }  
  .sb-top { padding:12px; }  
  .new-chat {  
    width:100%; padding:11px 14px; background:#c05621; border:none;  
    color:#fff; border-radius:8px; cursor:pointer; font-size:14px;  
    font-weight:600; display:flex; align-items:center; gap:8px;  
    justify-content:center;  
  }  
  .new-chat:hover { background:#9c4419; }  
  .sb-label {  
    padding:14px 16px 6px; font-size:11px; color:#777;  
    text-transform:uppercase; letter-spacing:0.5px;  
  }  
  .history { flex:1; overflow-y:auto; padding:0 8px; }  
  .hist-item {  
    padding:10px 12px; border-radius:8px; cursor:pointer; font-size:13px;  
    color:#ccc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;  
    margin-bottom:2px; display:flex; align-items:center; gap:8px;  
    position:relative;  
  }  
  .hist-item:hover { background:#262626; }  
  .hist-item.active { background:#2d2d2d; }  
  .hist-item .del {  
    margin-left:auto; opacity:0; color:#888; font-size:14px;  
    padding:0 4px; flex-shrink:0;  
  }  
  .hist-item:hover .del { opacity:1; }  
  .hist-item .del:hover { color:#e74c3c; }  
  .sb-bottom {  
    padding:12px; border-top:1px solid #2d2d2d; font-size:11px; color:#666;  
    text-align:center;  
  }  
  
  /* ===== MAIN ===== */  
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }  
  header {  
    padding:14px 20px; border-bottom:1px solid #2d2d2d;  
    display:flex; align-items:center; gap:12px; background:#212121;  
  }  
  .toggle-btn {  
    background:none; border:none; color:#aaa; cursor:pointer;  
    font-size:20px; padding:4px 8px; border-radius:6px;  
  }  
  .toggle-btn:hover { background:#2d2d2d; }  
  header h1 { font-size:17px; font-weight:600; }  
  header .badge {  
    font-size:11px; background:#3a3a3a; padding:3px 8px;  
    border-radius:10px; color:#aaa;  
  }  
  
  #chat {  
    flex:1; overflow-y:auto; padding:24px;  
    display:flex; flex-direction:column; gap:24px;  
    max-width:780px; width:100%; margin:0 auto;  
  }  
  .msg { display:flex; gap:14px; line-height:1.65; }  
  .avatar {  
    width:30px; height:30px; border-radius:6px; flex-shrink:0;  
    display:flex; align-items:center; justify-content:center;  
    font-size:14px; font-weight:700;  
  }  
  .user .avatar { background:#4a5568; }  
  .bot .avatar  { background:#c05621; }  
  .content { flex:1; padding-top:3px; min-width:0; }  
  .content h1,.content h2,.content h3 { margin:14px 0 8px; font-size:16px; }  
  .content p { margin:8px 0; }  
  .content ul,.content ol { margin:8px 0 8px 22px; }  
  .content li { margin:4px 0; }  
  .content strong { color:#fff; }  
  
  /* ===== Normal tables ===== */  
  .content table {  
    border-collapse:collapse; margin:12px 0; width:100%; font-size:14px;  
  }  
  .content th,.content td {  
    border:1px solid #3d3d3d; padding:8px 12px; text-align:left;  
  }  
  .content th { background:#2d2d2d; }  
  .content code {  
    background:#2d2d2d; padding:2px 6px; border-radius:4px; font-size:13px;  
  }  
  
  /* ===== FANCY HIGHLIGHT TABLE (image jaisa) ===== */  
  .tax-card {  
    margin:20px 0; border-radius:12px; overflow:hidden;  
    box-shadow:0 4px 16px rgba(0,0,0,0.4); border:1px solid #3d3d3d;  
  }  
  .tax-card-header {  
    background:linear-gradient(135deg,#e53e3e,#c05621);  
    color:#fff; padding:14px 18px; font-size:15px; font-weight:700;  
    text-align:center; letter-spacing:0.5px; text-transform:uppercase;  
  }  
  .tax-card table {  
    border-collapse:collapse; width:100%; margin:0; font-size:13.5px;  
  }  
  .tax-card thead tr { background:#2a2a2a; }  
  .tax-card th {  
    background:#2a2a2a; color:#ff9a5c; font-weight:700;  
    padding:11px 14px; text-align:left; border:1px solid #3d3d3d;  
  }  
  .tax-card td {  
    border:1px solid #333; padding:10px 14px; vertical-align:top;  
  }  
  .tax-card tbody tr:nth-child(even) { background:#232323; }  
  .tax-card tbody tr:nth-child(odd)  { background:#1c1c1c; }  
  .tax-card tbody tr:hover { background:#2d2d2d; }  
  .tax-card td strong { color:#ff9a5c; }  
  
  footer {  
    padding:16px 24px; border-top:1px solid #2d2d2d; background:#212121;  
  }  
  .input-box {  
    max-width:780px; margin:0 auto; display:flex; gap:10px;  
    background:#2d2d2d; border-radius:12px; padding:10px 14px;  
    border:1px solid #3d3d3d;  
  }  
  .input-box:focus-within { border-color:#c05621; }  
  #q {  
    flex:1; background:none; border:none; color:#e8e8e8;  
    font-size:15px; outline:none; resize:none; max-height:120px;  
    font-family:inherit;  
  }  
  #send {  
    background:#c05621; border:none; color:#fff; width:36px; height:36px;  
    border-radius:8px; cursor:pointer; font-size:16px; flex-shrink:0;  
  }  
  #send:disabled { opacity:0.4; cursor:not-allowed; }  
  .hint { text-align:center; font-size:11px; color:#666; margin-top:8px; }  
  
  .empty { text-align:center; color:#666; margin:auto; padding:40px; }  
  .empty h2 { font-size:22px; margin-bottom:8px; color:#aaa; }  
  .chips { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:20px; }  
  .chip {  
    background:#2d2d2d; border:1px solid #3d3d3d; padding:8px 14px;  
    border-radius:18px; font-size:13px; cursor:pointer; color:#ccc;  
  }  
  .chip:hover { border-color:#c05621; }  
  .cursor::after { content:"▋"; animation:blink 1s infinite; color:#c05621; }  
  @keyframes blink { 50% { opacity:0; } }  
  
  @media (max-width:768px) {  
    #sidebar { position:absolute; z-index:10; height:100%; }  
  }  
</style>  
</head>  
<body>  
  
  <!-- ===== SIDEBAR ===== -->  
  <div id="sidebar">  
    <div class="sb-top">  
      <button class="new-chat" onclick="newChat()">  
        <span>＋</span> New Chat  
      </button>  
    </div>  
    <div class="sb-label">Recent Chats</div>  
    <div class="history" id="history"></div>  
    <div class="sb-bottom">💼 Income Tax AI · 2025</div>  
  </div>  
  
  <!-- ===== MAIN ===== -->  
  <div id="main">  
    <header>  
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>  
      <h1>💼 Income Tax AI</h1>  
      <span class="badge">New 2025 · Old 1961</span>  
    </header>  
  
    <div id="chat"></div>  
  
    <footer>  
      <div class="input-box">  
        <textarea id="q" rows="1" placeholder="Ask anything about Income Tax..."></textarea>  
        <button id="send" onclick="sendMsg()">➤</button>  
      </div>  
      <div class="hint">AI can make mistakes. Verify with official Act sections.</div>  
    </footer>  
  </div>  
  
<script>  
const chat = document.getElementById('chat');  
const qBox = document.getElementById('q');  
const sendBtn = document.getElementById('send');  
const historyEl = document.getElementById('history');  
  
let chats = JSON.parse(localStorage.getItem('taxai_chats') || '{}');  
let currentId = null;  
  
// ===== Sidebar toggle =====  
function toggleSidebar(){  
  document.getElementById('sidebar').classList.toggle('hidden');  
}  
  
// ===== Auto-grow textarea =====  
qBox.addEventListener('input', () => {  
  qBox.style.height = 'auto';  
  qBox.style.height = Math.min(qBox.scrollHeight, 120) + 'px';  
});  
qBox.addEventListener('keydown', e => {  
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }  
});  
  
function quick(text){ qBox.value = text; sendMsg(); }  
  
// ===== Welcome screen =====  
function showWelcome(){  
  chat.innerHTML = `  
    <div class="empty">  
      <h2>How can I help you today?</h2>  
      <p>Ask about any section, chapter, or comparison.</p>  
      <div class="chips">  
        <div class="chip" onclick="quick('Explain section 80C')">Section 80C</div>  
        <div class="chip" onclick="quick('Chapter 4 ke baare mein batao')">Chapter 4</div>  
        <div class="chip" onclick="quick('New aur old act mein kaunsa better hai?')">Which Act is better?</div>  
        <div class="chip" onclick="quick('What is HRA exemption?')">HRA</div>  
      </div>  
    </div>`;  
}  
  
// ===== New chat =====  
function newChat(){  
  currentId = null;  
  showWelcome();  
  renderHistory();  
  qBox.focus();  
}  
  
// ===== Save current chat =====  
function saveChat(){  
  if(!currentId) return;  
  localStorage.setItem('taxai_chats', JSON.stringify(chats));  
  renderHistory();  
}  
  
// ===== Render history sidebar =====  
function renderHistory(){  
  const ids = Object.keys(chats).sort((a,b)=>chats[b].time-chats[a].time);  
  if(ids.length===0){  
    historyEl.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:#555;">No chats yet</div>';  
    return;  
  }  
  historyEl.innerHTML = ids.map(id => `  
    <div class="hist-item ${id===currentId?'active':''}" onclick="loadChat('${id}')">  
      <span>💬</span>  
      <span style="overflow:hidden;text-overflow:ellipsis;">${chats[id].title}</span>  
      <span class="del" onclick="delChat(event,'${id}')">✕</span>  
    </div>`).join('');  
}  
  
// ===== Load a chat =====  
function loadChat(id){  
  currentId = id;  
  chat.innerHTML = '';  
  chats[id].messages.forEach(m => {  
    const c = addMsg(m.role, m.role==='user'?m.text:'');  
    if(m.role==='bot') c.innerHTML = md(m.text);  
  });  
  renderHistory();  
}  
  
// ===== Delete a chat =====  
function delChat(e, id){  
  e.stopPropagation();  
  delete chats[id];  
  localStorage.setItem('taxai_chats', JSON.stringify(chats));  
  if(id===currentId) newChat();  
  else renderHistory();  
}  
  
// ===== Markdown renderer =====  
function md(t){  
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');  
  
  // ===== Special TAXTABLE fancy card =====  
  t = t.replace(/$\[TAXTABLE:\s*(.*?)$\]([\s\S]*?)$\[\/TAXTABLE$\]/g,  
    (match, title, tableMd) => {  
      const rows = tableMd.trim().split('\n').filter(r => r.includes('|'));  
      if(rows.length < 2) return '';  
      let tbl = '<table><thead>';  
      let bodyOn = false;  
      rows.forEach((r, i) => {  
        if(/^\|[\s\-:|]+\|$/.test(r)) {  
          tbl += '</thead><tbody>'; bodyOn = true; return;  
        }  
        const cells = r.split('|').slice(1, -1);  
        const tag = (i === 0 && !bodyOn) ? 'th' : 'td';  
        tbl += '<tr>' + cells.map(c => {  
          let v = c.trim().replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');  
          return `<${tag}>${v}</${tag}>`;  
        }).join('') + '</tr>';  
      });  
      if(!bodyOn) tbl += '</thead>';  
      tbl += '</tbody></table>';  
      return `<div class="tax-card">  
                <div class="tax-card-header">${title.trim()}</div>  
                ${tbl}  
              </div>`;  
    });  
  
  // ===== Normal tables =====  
  t = t.replace(/((?:\|.*\|\n?)+)/g, m => {  
    const rows = m.trim().split('\n').filter(r=>r.includes('|'));  
    if(rows.length<2) return m;  
    let html='<table>';  
    rows.forEach((r,i)=>{  
      if(/^\|[\s\-:|]+\|$/.test(r)) return;  
      const cells=r.split('|').slice(1,-1);  
      const tag=(i===0)?'th':'td';  
      html+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';  
    });  
    return html+'</table>';  
  });  
  
  t = t.replace(/^### (.*)$/gm,'<h3>$1</h3>')  
       .replace(/^## (.*)$/gm,'<h2>$1</h2>')  
       .replace(/^# (.*)$/gm,'<h1>$1</h1>')  
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')  
       .replace(/`(.+?)`/g,'<code>$1</code>')  
       .replace(/^\s*[-*] (.*)$/gm,'<li>$1</li>')  
       .replace(/(<li>.*<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>')  
       .replace(/\n\n/g,'</p><p>')  
       .replace(/\n/g,'<br>');  
  return '<p>'+t+'</p>';  
}  
  
// ===== Add message bubble =====  
function addMsg(role, text){  
  const empty = chat.querySelector('.empty');  
  if(empty) empty.remove();  
  const div = document.createElement('div');  
  div.className = 'msg ' + role;  
  div.innerHTML = `<div class="avatar">${role==='user'?'U':'AI'}</div>  
                   <div class="content">${role==='user'?escapeHtml(text):''}</div>`;  
  chat.appendChild(div);  
  chat.scrollTop = chat.scrollHeight;  
  return div.querySelector('.content');  
}  
  
function escapeHtml(t){  
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');  
}  
  
// ===== Send message =====  
async function sendMsg(){  
  const q = qBox.value.trim();  
  if(!q) return;  
  qBox.value=''; qBox.style.height='auto';  
  sendBtn.disabled = true;  
  
  // New chat? create entry  
  if(!currentId){  
    currentId = 'c' + Date.now();  
    chats[currentId] = {  
      title: q.slice(0,40),  
      time: Date.now(),  
      messages: []  
    };  
  }  
  chats[currentId].messages.push({role:'user', text:q});  
  
  addMsg('user', q);  
  const out = addMsg('bot', '');  
  out.classList.add('cursor');  
  
  let raw = '';  
  try {  
    const res = await fetch('/api/chat', {  
      method:'POST',  
      headers:{'Content-Type':'application/json'},  
      body: JSON.stringify({question:q})  
    });  
    const reader = res.body.getReader();  
    const dec = new TextDecoder();  
    while(true){  
      const {done, value} = await reader.read();  
      if(done) break;  
      raw += dec.decode(value, {stream:true});  
      out.innerHTML = md(raw);  
      chat.scrollTop = chat.scrollHeight;  
    }  
  } catch(e){  
    raw = '❌ Error: ' + e.message;  
    out.innerHTML = raw;  
  }  
  out.classList.remove('cursor');  
  out.innerHTML = md(raw);  
  
  chats[currentId].messages.push({role:'bot', text:raw});  
  saveChat();  
  
  sendBtn.disabled = false;  
  qBox.focus();  
}  
  
// ===== Init =====  
showWelcome();  
renderHistory();  
</script>  
</body>  
</html>
